<!doctype html>

    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect handler
      ;(function () {
        var p = window.location.search.match(/[?&]p=([^&]*)/)
        if (p) {
          var path = p[1].replace(/~and~/g, '&')
          var q = window.location.search.match(/[?&]q=([^&]*)/)
          var query = q ? '?' + q[1].replace(/~and~/g, '&') : ''
          var hash = window.location.hash
          window.history.replaceState(null, null, '/' + path + query + hash)
        }
      })()
    </script>
    <script>
      if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
        location.replace('https://tekststudio.pl' + location.pathname + location.search + location.hash)
      }
    </script>
